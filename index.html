<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>AR — Любимый край</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    #ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      transition: opacity 0.4s ease;
    }
    #ui.hidden { pointer-events: none; opacity: 0; }
    #ui h1 { margin: 0 0 0.5rem; font-size: 1.5rem; font-weight: 600; }
    #ui p { margin: 0 0 1.5rem; font-size: 0.9rem; opacity: 0.85; text-align: center; max-width: 280px; }
    #btn-start {
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a2e;
      background: #eab676;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(234, 182, 118, 0.4);
    }
    #btn-start:hover { background: #f0c686; }
    #btn-start:disabled { opacity: 0.6; cursor: not-allowed; }
    #loading { margin-top: 1rem; font-size: 0.85rem; opacity: 0.8; }
    #canvas-wrap { position: fixed; inset: 0; z-index: 1; }
    #canvas-wrap.hidden { visibility: hidden; }
    #model-loading {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 0.8rem;
      border-radius: 8px;
      transition: opacity 0.3s ease;
    }
    #model-loading.hidden { opacity: 0; pointer-events: none; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="ui">
    <h1>AR-сюрприз</h1>
    <p id="ui-subtitle">Разрешите камеру — и увидите 3D-анимацию.</p>
    <button type="button" id="btn-start">Запустить</button>
    <div id="loading" class="hidden">Загрузка…</div>
  </div>
  <div id="canvas-wrap" class="hidden">
    <canvas id="canvas"></canvas>
    <div id="model-loading">Загружаем модель…</div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="app.js"></script>
</body>
</html>
